<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>DS4 Bridge</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 24px auto; padding: 0 16px; }
    .row { display:flex; gap:16px; flex-wrap:wrap; }
    .card { border:1px solid #ddd; border-radius:12px; padding:16px; flex:1; min-width:280px; }
    label { display:flex; align-items:center; gap:8px; margin:8px 0; }
    input[type="number"] { width: 110px; }
    code { background:#f6f6f6; padding:2px 6px; border-radius:6px; }
  </style>
</head>
<body>
  <h1>DS4 Bridge</h1>

  <div class="row">
    <div class="card">
      <h3>Status</h3>
      <div id="status">loading...</div>
    </div>

    <div class="card">
      <h3>Config</h3>
      <label>
        <input id="ds4_back_as_touchpad_click" type="checkbox"/>
        ds4_back_as_touchpad_click
      </label>

      <label>
        XInput User Index
        <input id="xinput_user_index" type="number" min="0" max="3"/>
      </label>

      <label>
        Poll Hz
        <input id="poll_hz" type="number" min="60" max="1000"/>
      </label>

      <label>
        <input id="feedback_to_xinput" type="checkbox"/>
        feedback_to_xinput
      </label>

      <button id="save">Save</button>
      <span id="saved"></span>
    </div>
  </div>

<script>
async function getJson(url) {
  const r = await fetch(url);
  return await r.json();
}

async function putJson(url, body) {
  const r = await fetch(url, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  return await r.json();
}

async function refresh() {
  const s = await getJson("/api/status");
  document.getElementById("status").innerHTML = `
    <div>Running: <b>${s.running}</b></div>
    <div>PhysicalConnected: <b>${s.physicalConnected}</b></div>
    <div>VirtualConnected: <b>${s.virtualConnected}</b></div>
    <div>LastPacketNumber: <code>${s.lastPacketNumber}</code></div>
    <div>LastFeedback(L/S): <code>${s.lastFeedbackLarge}</code> / <code>${s.lastFeedbackSmall}</code></div>
    <div>LastError: <code>${s.lastError ?? ""}</code></div>
  `;
}

async function loadCfg() {
  const c = await getJson("/api/config");
  document.getElementById("ds4_back_as_touchpad_click").checked = !!c.ds4_back_as_touchpad_click;
  document.getElementById("xinput_user_index").value = c.xinput_user_index ?? 0;
  document.getElementById("poll_hz").value = c.poll_hz ?? 250;
  document.getElementById("feedback_to_xinput").checked = !!c.feedback_to_xinput;
}

document.getElementById("save").addEventListener("click", async () => {
  const body = {
    ds4_back_as_touchpad_click: document.getElementById("ds4_back_as_touchpad_click").checked,
    xinput_user_index: parseInt(document.getElementById("xinput_user_index").value || "0", 10),
    poll_hz: parseInt(document.getElementById("poll_hz").value || "250", 10),
    feedback_to_xinput: document.getElementById("feedback_to_xinput").checked,
    treat_trigger_as_button: true,
    trigger_button_threshold: 20
  };
  await putJson("/api/config", body);
  document.getElementById("saved").textContent = "saved!";
  setTimeout(()=>document.getElementById("saved").textContent="", 800);
});

loadCfg();
refresh();
setInterval(refresh, 500);
</script>
</body>
</html>
